# On Windows + Git Bash, /usr/bin/link.exe (GNU coreutils) shadows MSVC's link.exe on PATH.
# Pin cargo to the MSVC linker explicitly so builds work from any shell.
[target.x86_64-pc-windows-msvc]
linker = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\VC\\Tools\\MSVC\\14.44.35207\\bin\\Hostx64\\x64\\link.exe"
